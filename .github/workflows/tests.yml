name: tests

on: [push, pull_request]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      # Le dossier doit s'appeler dadou_utils_ros : le dépôt entier est le package.
      - uses: actions/checkout@v4
        with:
          path: dadou_utils_ros

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r dadou_utils_ros/requirements-test.txt

      - run: python -m pytest
        working-directory: dadou_utils_ros

  # Le garde-fou qui manquait au bug MODE (c08eb82, 10 mois de bras inertes) :
  # chaque push de la lib exécute les tests unitaires des DÉPÔTS CONSOMMATEURS
  # avec CETTE version de la lib (leur symlink dadou_utils_ros -> ../dadou_utils_ros
  # résout sur le checkout ci-dessous). Les tests de contrat des consommateurs
  # (test_contrat_utils.py côté robot, test_utils_static_contract.py côté control)
  # rougissent si une valeur partagée dérive.
  consumers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: duvamduvam/dadou_robot_ros
            dir: dadou_robot_ros
          - repo: duvamduvam/dadou_vision
            dir: dadou_vision_ros
          - repo: duvamduvam/dadou_control_ros
            dir: dadou_control_ros
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dadou_utils_ros
      # NB : échoue si le dépôt consommateur est privé (GITHUB_TOKEN ne voit que
      # le dépôt courant) — dans ce cas ajouter un PAT en secret et le passer ici.
      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          path: ${{ matrix.dir }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r ${{ matrix.dir }}/requirements-test.txt
      - run: python -m pytest
        working-directory: ${{ matrix.dir }}
